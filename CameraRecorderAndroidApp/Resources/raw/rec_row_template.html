<tr data-url="{{URL}}" data-name="{{NAME}}">
    <td>{{NAME}}</td>
    <td class="size">{{SIZE}}</td>
    <td class="btn-col">
        <button
            class="btn-play"
            onclick="playRecording('{{URL}}','{{NAME}}')"
            title="Воспроизвести"
        >
            ▶
        </button>
    </td>
    <td class="btn-col">
        <button class="btn-del" onclick="del('{{URL}}')" title="Удалить">
            ✕
        </button>
    </td>
</tr>
