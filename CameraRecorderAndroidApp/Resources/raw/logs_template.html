<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Логи</title>
        <style>
            body {
                font-family: sans-serif;
                margin: 12px;
                background: #1a1a2e;
                color: #e0e0e0;
            }
            h2 {
                color: #e94560;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 8px;
            }
            th {
                text-align: left;
                padding: 10px 8px;
                border-bottom: 2px solid #e94560;
                color: #e94560;
            }
            td {
                padding: 8px 8px;
                border-bottom: 1px solid #333;
            }
            a {
                color: #64b5f6;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            .size {
                text-align: right;
                color: #888;
            }
            .del {
                text-align: center;
                width: 40px;
            }
        </style>
        <script>
            async function del(url) {
                if (!confirm("Удалить " + url + "?")) return;
                const res = await fetch("/logs/" + url, { method: "DELETE" });
                if (res.ok) location.reload();
                else alert("Ошибка удаления");
            }
        </script>
    </head>
    <body>
        <h2>📄 Логи</h2>
        <table>
            <tr>
                <th>Файл</th>
                <th class="size">Размер</th>
                <th class="del"></th>
            </tr>
            {{ROWS}}
        </table>
    </body>
</html>
